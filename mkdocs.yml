site_name: Zenergy Matcha Wiki
site_url: https://chang-the-one.github.io/matcha-wiki/
site_description: Zenergy Tea's matcha knowledge hub for ceremonial matcha, teaware, and Japanese tea culture.
repo_url: https://github.com/Chang-the-one/matcha-wiki
repo_name: Chang-the-one/matcha-wiki

# This repository stores Markdown content at the repository root:
#   index.md
#   posts/*.md
# Keep docs_dir as "." so MkDocs can find the existing content.
docs_dir: .
site_dir: site

exclude_docs: |
  README.md
  site/
  utils/
  .github/
  requirements.txt

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: teal

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - footnotes
  - attr_list
  - pymdownx.extra
  - pymdownx.superfences

plugins:
  - search

nav:
  - Home: index.md
  - Blog Summaries: posts/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Chang-the-one/matcha-wiki
